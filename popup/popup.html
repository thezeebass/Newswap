<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NewSwap</title>
<style>
  body {
    width: 240px;
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1a1a2e;
    color: #eee;
  }
  .p-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid #2a2a45;
  }
  .p-header h1 {
    margin: 0;
    font-size: 15px;
    color: #4361ee;
  }
  .p-body {
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .p-toggle-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
  }
  .p-switch {
    position: relative;
    width: 40px;
    height: 22px;
  }
  .p-switch input { opacity: 0; width: 0; height: 0; }
  .p-slider {
    position: absolute; cursor: pointer; inset: 0;
    background: #444; border-radius: 22px; transition: 0.2s;
  }
  .p-slider:before {
    content: ""; position: absolute; height: 16px; width: 16px;
    left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: 0.2s;
  }
  input:checked + .p-slider { background: #4361ee; }
  input:checked + .p-slider:before { transform: translateX(18px); }
  button {
    width: 100%;
    padding: 9px;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .p-btn-secondary { background: #2a2a45; color: #eee; }
  .p-btn-secondary:hover { background: #34345a; }
  .p-btn-link {
    background: none;
    color: #4361ee;
    text-decoration: underline;
    padding: 4px;
  }
</style>
</head>
<body>
  <div class="p-header"><h1>NewSwap</h1></div>
  <div class="p-body">
    <div class="p-toggle-row">
      <span>Replacements active</span>
      <label class="p-switch">
        <input type="checkbox" id="toggle-enabled">
        <span class="p-slider"></span>
      </label>
    </div>
    <button id="btn-show-original" class="p-btn-secondary">Show original page</button>
    <button id="btn-open-options" class="p-btn-link">Manage replacements</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
